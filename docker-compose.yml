services:
  mysql:
    image: mysql:8.4
    container_name: resumelint-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resumelint
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - resumelint-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: resumelint-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: resumelint
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set to a long random string}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8080"

volumes:
  resumelint-mysql-data:
