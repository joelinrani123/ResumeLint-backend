# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}
server.tomcat.max-http-form-post-size=5MB
server.tomcat.max-swallow-size=5MB
server.error.include-message=always

# ---------------------------------------------------------------------------
# Datasource (MySQL)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:resumelint}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# "update" auto-creates/updates tables from the entities below. Set to
# "validate" or "none" in production once the schema is stable, and manage
# migrations with the schema-mysql.sql script instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# Auth / JWT
# ---------------------------------------------------------------------------
# REQUIRED. Must be set to a long, random secret in every environment.
app.jwt.secret=${SESSION_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.resumelint=INFO
SESSION_SECRET=your_very_long_random_secret_key_123456789